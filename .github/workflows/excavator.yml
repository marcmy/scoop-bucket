on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - ffmpeg-build-released
      - qbittorrent-custom-built
  push:
    branches:
      - master
    paths:
      - 'bucket/*.json'
      - 'scripts/**/*.reg'
      - '.github/workflows/excavator.yml'
  schedule:
    # run every 30 minutes
    - cron: '13 * * * *'
name: Excavator
permissions:
  contents: write
jobs:
  excavate:
    name: Excavate
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@main
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: 1
          SPECIAL_SNOWFLAKES: qbittorrent-custom
